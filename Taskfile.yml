version: '3'
silent: true

vars:
  REPO_DIR: '{{.TASKFILE_DIR}}'
  SERVER_DIR: /data/games/servers/minecraft/fantasy-lan
  PACK_URL: http://127.0.0.1:8080/pack.toml
  PUBLIC_PACK_URL: https://usersina.github.io/mc-fantasy-packwiz/stable/pack.toml
  SITE_DIR: dist/site/stable
  JAVA21: /usr/lib/jvm/java-21-openjdk/bin/java
  CLIENT_PACK_SLUG: mc-fantasy
  CLIENT_TEST_DIR: dist/client-test
  CLIENT_TEST_IMPORT_SLUG: mc-fantasy-dev
  CLIENT_TEST_PORT: 8082
  CLIENT_INSTANCE_ID: ''
  CLIENT_LAUNCHER: ''
  CLIENT_LAUNCHER_ROOT: ''
  CLIENT_SERVER: ''
  CLIENT_TEST_DISABLE_PRELAUNCH: 'true'
  LAUNCH: 'true'
  RESET: 'false'
  INSPECT: ''
  MOD: ''
  INSTANCE_MC_DIR: ''

tasks:
  server:setup:
    desc: Create/install the server runtime
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" JAVA21="{{.JAVA21}}" ACCEPT_EULA=true ./scripts/server.sh setup

  pack:refresh:
    desc: Refresh packwiz index
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh

  pack:site:
    desc: Build GitHub Pages stable Packwiz site
    dir: '{{.REPO_DIR}}'
    cmds:
      - SITE_DIR="{{.SITE_DIR}}" ./scripts/pack.sh site

  pack:smoke-update:
    desc: Smoke-test client auto-update install
    dir: '{{.REPO_DIR}}'
    cmds:
      - |
        pack_url="${PACK_URL:-{{.PUBLIC_PACK_URL}}}"
        if [ "{{.PACK_URL}}" != "http://127.0.0.1:8080/pack.toml" ]; then
          pack_url="{{.PACK_URL}}"
        fi
        PACK_URL="$pack_url" JAVA21="${JAVA21:-{{.JAVA21}}}" ./scripts/pack.sh smoke-update

  pack:export-client:
    desc: Export Prism/Freesm .mrpack into dist/
    dir: '{{.REPO_DIR}}'
    cmds:
      - CLIENT_PACK_SLUG="{{.CLIENT_PACK_SLUG}}" ./scripts/pack.sh export-client

  pack:inspect:
    desc: Inspect a mod, materialized pack, launcher instance, or generated server configs
    dir: '{{.REPO_DIR}}'
    cmds:
      - INSPECT="{{.INSPECT}}" MOD="{{.MOD}}" INSTANCE_MC_DIR="{{.INSTANCE_MC_DIR}}" PACK_URL="{{.PACK_URL}}" JAVA21="{{.JAVA21}}" ./scripts/pack.sh inspect

  pack:serve:
    desc: Serve packwiz locally
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz serve -p 8080

  local-mods:build:
    desc: Build tiny repo-local compatibility mods
    dir: '{{.REPO_DIR}}'
    cmds:
      - JAVA21="{{.JAVA21}}" ./local-mods/vampire-invisibility-aggro-fix/build.sh

  client:test:
    desc: Bootstrap, sync, or launch a Prism/Freesm maintainer test client
    dir: '{{.REPO_DIR}}'
    cmds:
      - CLIENT_PACK_SLUG="{{.CLIENT_PACK_SLUG}}" CLIENT_TEST_DIR="{{.CLIENT_TEST_DIR}}" CLIENT_TEST_IMPORT_SLUG="{{.CLIENT_TEST_IMPORT_SLUG}}" CLIENT_TEST_PORT="{{.CLIENT_TEST_PORT}}" CLIENT_INSTANCE_ID="{{.CLIENT_INSTANCE_ID}}" CLIENT_LAUNCHER="{{.CLIENT_LAUNCHER}}" CLIENT_LAUNCHER_ROOT="{{.CLIENT_LAUNCHER_ROOT}}" CLIENT_SERVER="{{.CLIENT_SERVER}}" CLIENT_TEST_DISABLE_PRELAUNCH="{{.CLIENT_TEST_DISABLE_PRELAUNCH}}" INSTANCE_MC_DIR="{{.INSTANCE_MC_DIR}}" JAVA21="{{.JAVA21}}" LAUNCH="{{.LAUNCH}}" RESET="{{.RESET}}" ./scripts/pack.sh client-test

  server:update:
    desc: Sync Packwiz-managed server files without starting
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh
      - SERVER_DIR="{{.SERVER_DIR}}" PACK_URL="{{.PACK_URL}}" JAVA21="{{.JAVA21}}" ./scripts/server.sh update

  server:start:
    desc: Sync server then start NeoForge
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh
      - SERVER_DIR="{{.SERVER_DIR}}" PACK_URL="{{.PACK_URL}}" JAVA21="{{.JAVA21}}" ./scripts/server.sh start

  server:diff-base:
    desc: Compare server-base templates with runtime copies
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" ./scripts/server.sh diff-base

  server:apply-base:
    desc: Backup and overwrite runtime base files from server-base templates
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" ./scripts/server.sh apply-base

  server:backup:
    desc: Backup world
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" ./scripts/server.sh backup
