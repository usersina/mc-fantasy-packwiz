version: '3'
silent: true

vars:
  REPO_DIR: '{{.TASKFILE_DIR}}'
  SERVER_DIR: /data/games/servers/minecraft/fantasy-lan
  PACK_URL: http://127.0.0.1:8080/pack.toml
  PUBLIC_PACK_URL: https://usersina.github.io/mc-fantasy-packwiz/stable/pack.toml
  SITE_DIR: dist/site/stable
  JAVA21: /usr/lib/jvm/java-21-openjdk/bin/java
  CLIENT_PACK_SLUG: mc-fantasy
  KEYBOARD: qwerty

tasks:
  server:setup:
    desc: Create/install the server runtime
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" JAVA21="{{.JAVA21}}" ACCEPT_EULA=true ./scripts/server.sh setup

  pack:refresh:
    desc: Refresh packwiz index
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh

  pack:site:
    desc: Build GitHub Pages stable Packwiz site
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh
      - SITE_DIR="{{.SITE_DIR}}" ./scripts/build-pack-site.sh

  pack:smoke-update:
    desc: Smoke-test client auto-update install
    dir: '{{.REPO_DIR}}'
    cmds:
      - PACK_URL="${PACK_URL:-{{.PUBLIC_PACK_URL}}}" JAVA21="{{.JAVA21}}" ./scripts/smoke-client-update.sh

  pack:export-client:
    desc: Export Prism/Freesm .mrpack into dist/
    dir: '{{.REPO_DIR}}'
    cmds:
      - |
        command -v zip >/dev/null || {
          echo "ERROR: zip is required for injecting client options into the exported .mrpack"
          exit 1
        }

        VERSION="$(awk -F'"' '/^version = / { print $2; exit }' pack.toml)"
        MC_VERSION="$(awk -F'"' '/^minecraft = / { print $2; exit }' pack.toml)"

        if [ -z "$VERSION" ] || [ -z "$MC_VERSION" ]; then
          echo "ERROR: could not read version or minecraft from pack.toml"
          exit 1
        fi

        KEYBOARD="$(printf '%s' "{{.KEYBOARD}}" | tr '[:upper:]' '[:lower:]')"
        case "$KEYBOARD" in
          qwerty|azerty) ;;
          *)
            echo "ERROR: KEYBOARD must be qwerty or azerty"
            exit 1
            ;;
        esac

        OPTIONS_FILE="client/options-${KEYBOARD}.txt"
        if [ ! -f "$OPTIONS_FILE" ]; then
          echo "ERROR: missing $OPTIONS_FILE"
          exit 1
        fi
        if ! awk 'NR == 1 { ok = ($0 ~ /^version:[0-9]+$/); next } $0 !~ /^key_/ { bad = 1 } END { exit !(ok && !bad) }' "$OPTIONS_FILE"; then
          echo "ERROR: $OPTIONS_FILE must start with version:<number> and contain only keybinding lines after that"
          exit 1
        fi

        packwiz refresh

        OUT="dist/{{.CLIENT_PACK_SLUG}}-${MC_VERSION}-v${VERSION}-${KEYBOARD}.mrpack"
        OUT_ABS="$PWD/$OUT"
        mkdir -p dist
        rm -f "$OUT_ABS"
        packwiz modrinth export -o "$OUT"

        TMP_DIR="$(mktemp -d)"
        trap 'rm -rf "$TMP_DIR"' EXIT

        mkdir -p "$TMP_DIR/overrides"
        cp "$OPTIONS_FILE" "$TMP_DIR/overrides/options.txt"
        (cd "$TMP_DIR" && zip -qr "$OUT_ABS" overrides/options.txt)
        echo "==> Added $OPTIONS_FILE as overrides/options.txt"

        echo "==> Wrote $OUT"

  pack:serve:
    desc: Serve packwiz locally
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz serve -p 8080

  server:update:
    desc: Sync Packwiz-managed server files without starting
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh
      - SERVER_DIR="{{.SERVER_DIR}}" PACK_URL="{{.PACK_URL}}" JAVA21="{{.JAVA21}}" ./scripts/server.sh update

  server:start:
    desc: Sync server then start NeoForge
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh
      - SERVER_DIR="{{.SERVER_DIR}}" PACK_URL="{{.PACK_URL}}" JAVA21="{{.JAVA21}}" ./scripts/server.sh start

  server:diff-base:
    desc: Compare server-base templates with runtime copies
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" ./scripts/server.sh diff-base

  server:apply-base:
    desc: Backup and overwrite runtime base files from server-base templates
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" ./scripts/server.sh apply-base

  server:backup:
    desc: Backup world
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" ./scripts/server.sh backup
