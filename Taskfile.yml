version: '3'
silent: true

vars:
  REPO_DIR: '{{.TASKFILE_DIR}}'
  SERVER_DIR: /data/games/servers/minecraft/fantasy-lan
  PACK_URL: http://127.0.0.1:8080/pack.toml
  JAVA21: /usr/lib/jvm/java-21-openjdk/bin/java
  CLIENT_PACK_SLUG: mc-fantasy
  KEYBOARD: qwerty

tasks:
  server:setup:
    desc: Create/install the server runtime from repo templates
    dir: '{{.REPO_DIR}}'
    cmds:
      - SERVER_DIR="{{.SERVER_DIR}}" JAVA21="{{.JAVA21}}" ACCEPT_EULA=true ./server/setup-fantasy-server.sh

  pack:refresh:
    desc: Refresh packwiz index
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh

  pack:export-client:
    desc: Export Prism/Freesm .mrpack into dist/
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz refresh
      - |
        VERSION="$(awk -F'"' '/^version = / { print $2; exit }' pack.toml)"
        MC_VERSION="$(awk -F'"' '/^minecraft = / { print $2; exit }' pack.toml)"

        if [ -z "$VERSION" ] || [ -z "$MC_VERSION" ]; then
          echo "ERROR: could not read version or minecraft from pack.toml"
          exit 1
        fi

        KEYBOARD="$(printf '%s' "{{.KEYBOARD}}" | tr '[:upper:]' '[:lower:]')"
        case "$KEYBOARD" in
          qwerty|azerty) ;;
          *)
            echo "ERROR: KEYBOARD must be qwerty or azerty"
            exit 1
            ;;
        esac

        OPTIONS_FILE="client/options-${KEYBOARD}.txt"
        if [ ! -f "$OPTIONS_FILE" ]; then
          echo "ERROR: missing $OPTIONS_FILE"
          exit 1
        fi

        OUT="dist/{{.CLIENT_PACK_SLUG}}-${MC_VERSION}-v${VERSION}-${KEYBOARD}.mrpack"
        OUT_ABS="$PWD/$OUT"
        mkdir -p dist
        packwiz modrinth export -o "$OUT"

        TMP_DIR="$(mktemp -d)"
        trap 'rm -rf "$TMP_DIR"' EXIT

        mkdir -p "$TMP_DIR/client-overrides"
        cp "$OPTIONS_FILE" "$TMP_DIR/client-overrides/options.txt"
        (cd "$TMP_DIR" && zip -qr "$OUT_ABS" client-overrides/options.txt)
        echo "==> Added $OPTIONS_FILE as client-overrides/options.txt"

        echo "==> Wrote $OUT"

  pack:serve:
    desc: Serve packwiz locally
    dir: '{{.REPO_DIR}}'
    cmds:
      - packwiz serve -p 8080

  server:sync:
    desc: Sync server-side mods/configs/datapacks from packwiz
    dir: '{{.REPO_DIR}}'
    cmds:
      - |
        test -x "{{.SERVER_DIR}}/start-packwiz-server.sh" || {
          echo "ERROR: run 'task server:setup' first"
          exit 1
        }
      - cd "{{.SERVER_DIR}}" && SYNC_ONLY=true PACK_URL="{{.PACK_URL}}" JAVA21="{{.JAVA21}}" REPO_DATAPACKS_DIR="{{.REPO_DIR}}/datapacks" ./start-packwiz-server.sh

  server:start:
    desc: Sync server then start NeoForge after setup
    dir: '{{.REPO_DIR}}'
    cmds:
      - |
        test -x "{{.SERVER_DIR}}/start-packwiz-server.sh" || {
          echo "ERROR: run 'task server:setup' first"
          exit 1
        }
      - cd "{{.SERVER_DIR}}" && PACK_URL="{{.PACK_URL}}" JAVA21="{{.JAVA21}}" REPO_DATAPACKS_DIR="{{.REPO_DIR}}/datapacks" ./start-packwiz-server.sh

  server:backup:
    desc: Backup world
    dir: '{{.REPO_DIR}}'
    cmds:
      - ./server/backup-world.sh
