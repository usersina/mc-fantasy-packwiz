# Supplementaries 1.21.1-3.7.4 tries to disable this through its NeoForge
# metadata, but its dotted TOML key is parsed incorrectly by Lithium.
# Keep this explicit so Supplementaries moving-block features use vanilla shapes.
mixin.block.moving_block_shapes=false

# Lithium 0.15.x can trip client chunk-palette decoding with heavy modded
# worldgen. Keep the safer vanilla locking checks in place.
mixin.chunk.no_locking=false
