[modules]
#Whether damage should be done by weather
dodamage = true
#Whether the mod's custom fire system is used
dowildfires = false
#Whether tornadoes should be possible
dotornadoes = true
#Whether cyclones should be possible
docyclones = true
#Whether squalls should be possible
dosqualls = true
#Whether debarking will be applied to logs
dodebarking = true
#Whether seasons exist
doseasons = true
#Whether temperatures affect crop growth and death
seasonalcrops = false

[spawning]
#Range within which clouds and storms will spawn from players
# Default: 384
# Range: 256 ~ 2048
spawnrange = 384
#1 in x chance that a spawning storm will spawn as a squall
# Default: 10
# Range: 1 ~ 100
chanceinonesquall = 10
#1 in x chance that a spawning storm will spawn as a cyclone
# Default: 64
# Range: 1 ~ 100
chanceinonecyclone = 64
#1 in x chance that a storm will progress to stage 1
# Default: 2
# Range: 1 ~ 100
chanceinonestage1 = 2
#1 in x chance that a storm will progress to stage 2
# Default: 3
# Range: 1 ~ 100
chanceinonestage2 = 3
#1 in x chance that a storm will progress to stage 3 / tornado
# Default: 5
# Range: 1 ~ 100
chanceinonestage3 = 12
#Chance a storm will spawn each minute
# Default: 0.2
# Range: 0.0 ~ 1.0
stormspawnchanceperminute = 0.12
#Whether chance to spawn storms and chance for storms to progress is affected by the game environment
environmentsystem = true
#Risk curve, higher is rarer
# Default: 1.0
# Range: 0.5 ~ 2.0
riskcurve = 1.25
#Maximum number of active storms allowed to spawn
# Default: 3
# Range: 1 ~ 10
maxstorms = 2

[storms]
#Multiplier of squall windspeeds
# Default: 1.25
# Range: 0.0 ~ 2.0
squallstrengthmultiplier = 1.25
#Maximum precipitation accumulation, 0 = off
# Default: 6
# Range: 0 ~ 8
snowaccumulationheight = 6
