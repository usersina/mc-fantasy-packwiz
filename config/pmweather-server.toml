#Size of storms
# Default: 300.0
# Range: 128.0 ~ 512.0
stormsize = 256.0
#Maximum width of tornadoes
# Default: 450
# Range: 100 ~ 1000
maxtornadowidth = 250
#Whether storms will aim at the player whenever strengthening into a tornado
aimatplayer = false
#Random range of blocks that storms will aim at around players
# Default: 248.0
# Range: 0.0 ~ 1024.0
aimatplayeroffset = 248.0
#Maximum number of blocks allowed to be damaged by a tornado per tick
# Default: 12500
# Range: 5000 ~ 40000
maxblocksdamagedpertick = 5000
#Whether damage should run every tick (off) or every 5th tick (on)
damageevery5thtick = true

[global]
#Overcast Modifier
# Default: 1.0
# Range: 0.0 ~ 1.4
overcastpercent = 1.0
#Rain Modifier
# Default: 0.8
# Range: 0.0 ~ 1.25
rainstrength = 0.8
#Height of first cloud layer
# Default: 315.0
# Range: 150.0 ~ 350.0
layer0height = 315.0
#Height of cirrus cloud layer
# Default: 2000.0
# Range: 1000.0 ~ 3000.0
layerCheight = 2000.0
#Multiplier of base windspeeds
# Default: 1.0
# Range: 0.0 ~ 4.0
backgroundwindmultiplier = 1.0
#List of valid dimensions for spawning weather
validdimensions = ["minecraft:overworld"]
#Length of months for seasons (in days)
# Default: 8
# Range: 1 ~ 31
monthlength = 8

