name: Publish Packwiz Site and Client Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Pin Packwiz so release artifacts stay reproducible; update after local smoke tests.
  PACKWIZ_SOURCE_COMMIT: dfd8b68a4796c763e25bad50265ea1f1233e24f1

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      asset_name: ${{ steps.export_client.outputs.asset_name }}
      pack_version: ${{ steps.export_client.outputs.pack_version }}
      minecraft_version: ${{ steps.export_client.outputs.minecraft_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false

      - name: Set up Java 17 for Packwiz Installer build
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: Build pinned Packwiz tools
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          if [ -z "$CURSEFORGE_API_KEY" ]; then
            echo "ERROR: CURSEFORGE_API_KEY GitHub Actions secret is not configured"
            exit 1
          fi
          task pack:build-auth-tools JAVA17_HOME="$JAVA_HOME"
          cp dist/tools/packwiz-installer.jar dist/packwiz-installer.jar
          echo "$GITHUB_WORKSPACE/dist/tools" >> "$GITHUB_PATH"

      - name: Set up Java 21 for Minecraft
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build stable Packwiz site
        run: task pack:site

      - name: Smoke-test client updater
        env:
          PACKWIZ_INSTALLER_MAIN_JAR: ${{ github.workspace }}/dist/tools/packwiz-installer.jar
        run: |
          python3 -m http.server 8081 --directory dist/site &
          server_pid="$!"
          trap 'kill "$server_pid"' EXIT

          for attempt in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:8081/stable/pack.toml >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8081/stable/pack.toml >/dev/null
          task pack:smoke-update PACK_URL=http://127.0.0.1:8081/stable/pack.toml JAVA21="$JAVA_HOME/bin/java"

      - name: Smoke-test generated server
        env:
          PACKWIZ_INSTALLER_MAIN_JAR: ${{ github.workspace }}/dist/tools/packwiz-installer.jar
        run: task pack:inspect INSPECT=server-generated JAVA21="$JAVA_HOME/bin/java"

      - name: Verify local patch jars match their sources
        run: |
          task local-mods:build JAVA21="$JAVA_HOME/bin/java"
          git diff --exit-code -- mods/

      - name: Export client .mrpack
        id: export_client
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: task pack:export-client

      - name: Verify API key containment
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          CLIENT_PACK: ${{ steps.export_client.outputs.asset_path }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          from zipfile import ZipFile

          key = os.environ["CURSEFORGE_API_KEY"].encode()
          for path in Path("dist/site").rglob("*"):
              if path.is_file() and key in path.read_bytes():
                  raise SystemExit(f"ERROR: API key leaked into hosted file: {path}")

          with ZipFile(os.environ["CLIENT_PACK"]) as archive:
              for name in archive.namelist():
                  if key in archive.read(name):
                      raise SystemExit(f"ERROR: API key leaked into client pack entry: {name}")
          PY

      - name: Upload client pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-pack
          path: |
            ${{ steps.export_client.outputs.asset_path }}
            dist/packwiz-installer.jar
          if-no-files-found: error

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download client pack artifact
        uses: actions/download-artifact@v4
        with:
          name: client-pack
          path: dist/release

      - name: Publish client release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: client-stable
          ASSET_NAME: ${{ needs.build.outputs.asset_name }}
          PACK_VERSION: ${{ needs.build.outputs.pack_version }}
          MC_VERSION: ${{ needs.build.outputs.minecraft_version }}
        run: |
          asset_path="dist/release/$ASSET_NAME"
          installer_path="dist/release/packwiz-installer.jar"
          if [ ! -f "$asset_path" ]; then
            echo "ERROR: missing downloaded client pack artifact: $asset_path"
            exit 1
          fi
          if [ -z "$installer_path" ] || [ ! -f "$installer_path" ]; then
            echo "ERROR: missing authenticated Packwiz Installer artifact"
            exit 1
          fi

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Stable client bootstrap for the Fantasy Pack.

          Import this stable URL into Prism Launcher or Freesm Launcher:
          https://github.com/${GITHUB_REPOSITORY}/releases/download/$RELEASE_TAG/$ASSET_NAME

          A .mrpack import is a snapshot. Relaunching the same instance only auto-updates if the instance has the Packwiz pre-launch updater command configured.

          Preferred live updater URL:
          https://usersina.github.io/mc-fantasy-packwiz/stable/pack.toml

          The Packwiz bootstrapper obtains the CurseForge-compatible installer from this release.

          Pack version: $PACK_VERSION
          Minecraft: $MC_VERSION
          Commit: $GITHUB_SHA
          EOF

          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            asset_ids="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.assets[] | select((.name | endswith(".mrpack")) or .name == "packwiz-installer.jar") | .id')"
            for asset_id in $asset_ids; do
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
            done

            gh release upload "$RELEASE_TAG" "$asset_path" "$installer_path"
            gh release edit "$RELEASE_TAG" \
              --title "Fantasy Pack Client Bootstrap" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --latest
          else
            gh release create "$RELEASE_TAG" "$asset_path" "$installer_path" \
              --title "Fantasy Pack Client Bootstrap" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --verify-tag \
              --latest
          fi
