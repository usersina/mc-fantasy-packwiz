name: Publish Packwiz Site and Client Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      asset_name: ${{ steps.export_client.outputs.asset_name }}
      pack_version: ${{ steps.export_client.outputs.pack_version }}
      minecraft_version: ${{ steps.export_client.outputs.minecraft_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build stable Packwiz site
        run: task pack:site

      - name: Smoke-test client updater
        run: |
          python3 -m http.server 8081 --directory dist/site &
          server_pid="$!"
          trap 'kill "$server_pid"' EXIT

          for attempt in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:8081/stable/pack.toml >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8081/stable/pack.toml >/dev/null
          task pack:smoke-update PACK_URL=http://127.0.0.1:8081/stable/pack.toml JAVA21="$JAVA_HOME/bin/java"

      - name: Export client .mrpack
        id: export_client
        run: task pack:export-client

      - name: Upload client pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-pack
          path: ${{ steps.export_client.outputs.asset_path }}
          if-no-files-found: error

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download client pack artifact
        uses: actions/download-artifact@v4
        with:
          name: client-pack
          path: dist/release

      - name: Publish client release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: client-stable
          ASSET_NAME: ${{ needs.build.outputs.asset_name }}
          PACK_VERSION: ${{ needs.build.outputs.pack_version }}
          MC_VERSION: ${{ needs.build.outputs.minecraft_version }}
        run: |
          asset_path="dist/release/$ASSET_NAME"
          if [ ! -f "$asset_path" ]; then
            echo "ERROR: missing downloaded client pack artifact: $asset_path"
            exit 1
          fi

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Stable client bootstrap for the Fantasy Pack.

          Download \`$ASSET_NAME\` and import it into Prism Launcher or Freesm Launcher.

          Preferred live updater URL:
          https://usersina.github.io/mc-fantasy-packwiz/stable/pack.toml

          Pack version: $PACK_VERSION
          Minecraft: $MC_VERSION
          Commit: $GITHUB_SHA
          EOF

          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            asset_ids="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.assets[] | select(.name | endswith(".mrpack")) | .id')"
            for asset_id in $asset_ids; do
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
            done

            gh release upload "$RELEASE_TAG" "$asset_path"
            gh release edit "$RELEASE_TAG" \
              --title "Fantasy Pack Client Bootstrap" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --latest
          else
            gh release create "$RELEASE_TAG" "$asset_path" \
              --title "Fantasy Pack Client Bootstrap" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --verify-tag \
              --latest
          fi
