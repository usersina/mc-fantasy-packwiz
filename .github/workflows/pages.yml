name: Publish Packwiz Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build stable Packwiz site
        run: |
          packwiz refresh
          SITE_DIR=dist/site/stable ./scripts/build-pack-site.sh

      - name: Smoke-test client updater
        run: |
          python3 -m http.server 8081 --directory dist/site &
          server_pid="$!"
          trap 'kill "$server_pid"' EXIT

          for attempt in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:8081/stable/pack.toml >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8081/stable/pack.toml >/dev/null
          PACK_URL=http://127.0.0.1:8081/stable/pack.toml JAVA21="$JAVA_HOME/bin/java" ./scripts/smoke-client-update.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
